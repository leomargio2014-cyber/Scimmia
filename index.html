<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makako Banana Blaster</title>
<style>
body{
    margin:0;
    background:#7fd0ff;
    overflow:hidden;
    font-family:sans-serif;
}
canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#87ceeb,#bdefff 70%,#5dbb63 70%);
}
#info{
    position:absolute;
    left:10px;
    top:10px;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 4px black;
}
</style>
</head>
<body>

<div id="info">← → Muovi | SPAZIO = Banana</div>
<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const player={
    x:430,
    y:430,
    w:40,
    h:50,
    speed:6
};

let keys={};
let bananas=[];
let enemies=[];
let score=0;
let gameOver=false;

document.addEventListener("keydown",e=>{
    keys[e.code]=true;

    if(e.code==="Space"){
        bananas.push({
            x:player.x+18,
            y:player.y,
            w:8,
            h:16,
            speed:8
        });
    }
});

document.addEventListener("keyup",e=>{
    keys[e.code]=false;
});

function spawnEnemy(){
    enemies.push({
        x:Math.random()*(canvas.width-40),
        y:-60,
        w:40,
        h:50,
        speed:2+Math.random()*2
    });
}

setInterval(()=>{
    if(!gameOver) spawnEnemy();
},1000);

function drawMonkey(){
    // corpo
    ctx.fillStyle="#7a4d2b";
    ctx.beginPath();
    ctx.arc(player.x+20,player.y+20,18,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#c68c53";
    ctx.beginPath();
    ctx.arc(player.x+20,player.y+23,10,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(player.x+16,player.y+20,2,0,Math.PI*2);
    ctx.arc(player.x+24,player.y+20,2,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#7a4d2b";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(player.x+20,player.y+38);
    ctx.lineTo(player.x+20,player.y+55);
    ctx.stroke();
}

function drawEnemy(e){
    // uniforme grigia
    ctx.fillStyle="#666";
    ctx.fillRect(e.x,e.y,40,50);

    // testa
    ctx.fillStyle="#f1c27d";
    ctx.fillRect(e.x+8,e.y-12,24,12);

    // casco
    ctx.fillStyle="#444";
    ctx.fillRect(e.x+6,e.y-16,28,6);

    // simbolo generico (nessuna iconografia reale)
    ctx.fillStyle="red";
    ctx.fillRect(e.x+16,e.y+16,8,8);
}

function drawBanana(b){
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.ellipse(b.x,b.y,5,10,0,0,Math.PI*2);
    ctx.fill();
}

function collide(a,b){
    return a.x<b.x+b.w &&
           a.x+a.w>b.x &&
           a.y<b.y+b.h &&
           a.y+a.h>b.y;
}

function update(){

    if(gameOver){
        ctx.fillStyle="rgba(0,0,0,.6)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        ctx.font="48px Arial";
        ctx.fillText("GAME OVER",300,220);

        ctx.font="30px Arial";
        ctx.fillText("Punteggio: "+score,350,270);
        return;
    }

    if(keys.ArrowLeft) player.x-=player.speed;
    if(keys.ArrowRight) player.x+=player.speed;

    player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));

    bananas.forEach(b=>b.y-=b.speed);
    bananas=bananas.filter(b=>b.y>-20);

    enemies.forEach(e=>e.y+=e.speed);

    enemies.forEach((e,ei)=>{
        bananas.forEach((b,bi)=>{
            if(collide(
                {x:b.x,y:b.y,w:b.w,h:b.h},
                e
            )){
                enemies.splice(ei,1);
                bananas.splice(bi,1);
                score++;
            }
        });

        if(e.y>430){
            gameOver=true;
        }
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawMonkey();

    bananas.forEach(drawBanana);
    enemies.forEach(drawEnemy);

    ctx.fillStyle="white";
    ctx.font="24px Arial";
    ctx.fillText("Punti: "+score,20,40);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
